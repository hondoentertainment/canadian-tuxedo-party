<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Printable QR code for the Canadian Tuxedo Party website — scan for games, photos, and party info.">
  <meta name="theme-color" content="#2d4a7a">
  <title>Print QR Code | Canadian Tuxedo Party</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍁</text></svg>">
</head>
<body class="qr-print-page">
  <main id="main" class="qr-print" data-qr-block>
    <div class="qr-print__sheet">
      <p class="qr-print__eyebrow">Canadian Tuxedo Party</p>
      <h1 class="qr-print__title">Scan to Join the Party</h1>
      <p class="qr-print__subtitle">Games · Photos · FAQ · Enter on the Woodlawn side</p>
      <div class="qr-print__frame qr-block__frame">
        <img
          class="qr-block__img qr-print__img"
          src="assets/qr-code.png"
          width="320"
          height="320"
          alt="QR code for the Canadian Tuxedo Party website"
        >
        <canvas class="qr-block__canvas is-hidden" data-size="320" width="320" height="320" aria-hidden="true"></canvas>
      </div>
      <p class="qr-print__url qr-block__url"></p>
      <p class="qr-print__date">Saturday, May 30, 2026 · 6:30 PM</p>
    </div>

    <div class="qr-print__actions no-print">
      <button class="btn btn--primary" type="button" onclick="window.print()">Print Sign</button>
      <a class="btn btn--secondary" href="assets/qr-code.png" download="canadian-tuxedo-party-qr.png">Download PNG</a>
      <button class="btn btn--secondary qr-block__copy" type="button">Copy link</button>
      <a class="btn btn--secondary" href="index.html">Back to Site</a>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/qr.js"></script>
</body>
</html>
